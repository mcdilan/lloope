<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Política de Privacidad y Términos · Lloope</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Jost:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="img/logo-mark.png" />
<script src="lloope-data.js?v=3"></script>
<style>
  :root{
    --cream:#FBF6EE; --cream-2:#F4EADB; --sand:#EADBC6; --paper:#FFFDF9;
    --espresso:#2B211A; --coffee:#5A4636; --wood:#B06B3E; --wood-dark:#8A4E2C;
    --copper:#C0824B; --gold:#CAA25A; --sage:#7E8B69;
    --line:rgba(43,33,26,.12);
    --shadow-sm:0 6px 18px rgba(70,46,26,.08);
    --r-lg:26px; --r-md:18px;
    --serif:"Fraunces",Georgia,serif; --sans:"Manrope",system-ui,sans-serif; --brand:"Jost",system-ui,sans-serif;
    --maxw:820px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--espresso);background:var(--cream);line-height:1.65;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  h1,h2{font-family:var(--serif);font-weight:600;line-height:1.15}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  header{background:rgba(251,246,238,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .nav{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:16px 0;max-width:var(--maxw);margin:0 auto;padding-left:24px;padding-right:24px}
  .brand{display:flex;align-items:center;gap:.7rem;font-family:var(--brand);font-weight:500;font-size:1.25rem;letter-spacing:.14em;text-transform:uppercase}
  .brand .mark{width:42px;height:42px;border-radius:13px;background:#fff;box-shadow:var(--shadow-sm);display:grid;place-items:center}
  .brand .mark img{width:78%;height:78%;object-fit:contain}
  .back-link{font-weight:700;font-size:.9rem;color:var(--coffee);display:flex;align-items:center;gap:.4em}
  .back-link:hover{color:var(--espresso)}

  main{padding:44px 0 90px}
  .page-title{margin-bottom:28px}
  .page-title span{font-size:.72rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--copper)}
  .page-title h1{font-size:clamp(1.9rem,3.6vw,2.6rem);margin-top:.4rem}

  .panel{background:var(--paper);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);border:1px solid rgba(43,33,26,.06);padding:26px;margin-bottom:20px}
  .panel h2{font-size:1.15rem;margin-bottom:.8rem}
  .panel p{white-space:pre-wrap;color:var(--coffee);font-size:.94rem}
  .panel ul{color:var(--coffee);font-size:.94rem;padding-left:1.2em;display:grid;gap:.5rem}
  .panel ul li strong{color:var(--espresso)}
  .contact-line{margin-top:.9rem;font-size:.9rem}
  .contact-line a{text-decoration:underline;font-weight:700;color:var(--wood-dark)}
</style>
</head>
<body>

<header>
  <div class="nav">
    <a href="index.html" class="brand">
      <span class="mark"><img src="img/logo-mark.png" alt="Lloope"/></span>
      <span>Lloope</span>
    </a>
    <a href="index.html" class="back-link">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Volver a la tienda
    </a>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="page-title">
      <span>Legal</span>
      <h1>Política de Privacidad y Términos</h1>
    </div>
    <div id="legalRoot"></div>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function section(title, text){
  if(!text) return '';
  return `<div class="panel"><h2>${esc(title)}</h2><p>${esc(text)}</p></div>`;
}

async function boot(){
  const DATA = await Lloope.loadPublicData();
  const legal = DATA.legal || {};
  const contact = DATA.contact || {};
  const whatsapp = String(contact.whatsapp||'').replace(/\D/g,'');

  let html = '';
  html += section('Política de privacidad', legal.privacy);
  html += section('Términos y condiciones', legal.terms);
  html += section('Cambios y devoluciones', legal.returns);
  html += section('Despacho', legal.shipping);
  html += section('IVA', legal.iva);
  html += section('Compra segura', legal.secure);

  html += `<div class="panel">
    <h2>Tus datos y tus derechos</h2>
    ${legal.dataRights ? `<p>${esc(legal.dataRights)}</p>` : ''}
    <div class="contact-line">
      ${contact.email ? `Escríbenos a <a href="mailto:${esc(contact.email)}">${esc(contact.email)}</a>` : ''}
      ${whatsapp ? ` o por <a href="https://wa.me/${whatsapp}" target="_blank" rel="noopener">WhatsApp</a>` : ''}
      para ejercer tus derechos sobre tus datos personales.
    </div>
  </div>`;

  $('#legalRoot').innerHTML = html || '<div class="panel"><p>Aún no hay textos legales configurados.</p></div>';
}
boot();
</script>
</body>
</html>
