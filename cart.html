<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tu carrito · Lloope</title>
<meta name="robots" content="noindex, follow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Jost:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="img/logo-mark.png" />
<script src="lloope-data.js?v=4"></script>
<script src="js/supabase.js?v=2.110.0"></script>
<style>
  :root{
    --cream:#FBF6EE; --cream-2:#F4EADB; --sand:#EADBC6; --paper:#FFFDF9;
    --espresso:#2B211A; --coffee:#5A4636; --wood:#B06B3E; --wood-dark:#8A4E2C;
    --copper:#C0824B; --gold:#CAA25A; --sage:#7E8B69;
    --line:rgba(43,33,26,.12);
    --shadow-sm:0 6px 18px rgba(70,46,26,.08);
    --shadow:0 22px 48px -18px rgba(70,46,26,.28);
    --r-lg:26px; --r-md:18px; --r-sm:12px;
    --serif:"Fraunces",Georgia,serif; --sans:"Manrope",system-ui,sans-serif; --brand:"Jost",system-ui,sans-serif;
    --maxw:1100px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--espresso);background:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  h1,h2,h3{font-family:var(--serif);font-weight:600;line-height:1.1}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

  .btn{display:inline-flex;align-items:center;gap:.55em;justify-content:center;padding:.9em 1.6em;border-radius:100px;font-weight:700;font-size:.95rem;transition:transform .2s,box-shadow .2s,opacity .2s;white-space:nowrap}
  .btn svg{width:18px;height:18px}
  .btn:hover{transform:translateY(-2px)}
  .btn-wood{background:linear-gradient(135deg,var(--wood),var(--wood-dark));color:#fff;box-shadow:0 14px 26px -12px rgba(138,78,44,.7)}
  .btn-wa{background:#25D366;color:#0b3d1f}
  .btn-mp{background:#009ee3;color:#fff;margin-top:8px}
  .btn-mp:hover{background:#007bbf}
  .btn-ghost{background:var(--paper);color:var(--espresso);border:1.5px solid var(--line)}
  .btn-block{width:100%}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

  header{background:rgba(251,246,238,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
  .nav{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:16px 0}
  .brand{display:flex;align-items:center;gap:.7rem;font-family:var(--brand);font-weight:500;font-size:1.25rem;letter-spacing:.14em;text-transform:uppercase}
  .brand .mark{width:42px;height:42px;border-radius:13px;background:#fff;box-shadow:var(--shadow-sm);display:grid;place-items:center}
  .brand .mark img{width:78%;height:78%;object-fit:contain}
  .back-link{font-weight:700;font-size:.9rem;color:var(--coffee);display:flex;align-items:center;gap:.4em}
  .back-link:hover{color:var(--espresso)}
  .icon-btn{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;background:var(--paper);box-shadow:var(--shadow-sm)}
  .icon-btn:hover{background:#fff}

  main{padding:44px 0 90px}
  .page-title{margin-bottom:32px}
  .page-title span{font-size:.72rem;font-weight:800;letter-spacing:.24em;text-transform:uppercase;color:var(--copper)}
  .page-title h1{font-size:clamp(1.9rem,3.6vw,2.6rem);margin-top:.4rem}

  .cart-layout{display:grid;grid-template-columns:1.4fr 1fr;gap:36px;align-items:start}
  .cart-summary-col{position:sticky;top:96px;max-height:calc(100vh - 116px);overflow-y:auto;padding-right:4px}

  .panel{background:var(--paper);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);border:1px solid rgba(43,33,26,.06);padding:26px}
  .panel + .panel{margin-top:20px}
  .panel h2{font-size:1.2rem;margin-bottom:1rem}

  .row-item{display:flex;gap:16px;padding:16px 0;border-bottom:1px solid var(--line);align-items:center}
  .row-item:last-child{border-bottom:none}
  .row-item .ri-img{width:74px;height:82px;border-radius:12px;overflow:hidden;flex:none;background:var(--sand)}
  .row-item .ri-img img{width:100%;height:100%;object-fit:cover}
  .row-item .ri-info{flex:1;min-width:0}
  .row-item .ri-cat{font-size:.7rem;color:var(--copper);font-weight:800;text-transform:uppercase;letter-spacing:.04em}
  .row-item h4{font-size:1rem;margin:.15rem 0}
  .row-item .ri-price{font-family:var(--serif);font-weight:600}
  .ri-controls{display:flex;align-items:center;gap:14px;flex:none}
  .qty{display:flex;align-items:center;gap:2px;background:var(--cream);border-radius:100px;padding:3px}
  .qty button{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:var(--coffee)}
  .qty button:hover{background:#fff}
  .qty span{min-width:26px;text-align:center;font-weight:700;font-size:.9rem}
  .ri-remove{color:var(--coffee);opacity:.6;transition:opacity .2s,color .2s}
  .ri-remove:hover{opacity:1;color:#c14a4a}
  .ri-remove svg{width:18px;height:18px}

  .empty-cart{text-align:center;padding:70px 20px}
  .empty-cart svg{width:70px;height:70px;color:var(--sand);margin:0 auto 1.2rem}
  .empty-cart h2{font-size:1.5rem;margin-bottom:.5rem}
  .empty-cart p{color:var(--coffee);margin-bottom:1.6rem}

  .coupon-row{display:flex;gap:.5rem;margin-bottom:.6rem}
  .coupon-row input{flex:1;padding:.75em .9em;border-radius:100px;border:1.5px solid var(--line);background:var(--cream);font-family:inherit;font-size:.88rem;text-transform:uppercase}
  .coupon-row input:focus{outline:none;border-color:var(--wood)}
  .coupon-row button{padding:.75em 1.2em;border-radius:100px;background:var(--espresso);color:#fff;font-weight:700;font-size:.84rem;flex:none}
  .coupon-msg{font-size:.8rem;font-weight:600;margin-bottom:1rem}
  .coupon-msg.ok{color:var(--sage)} .coupon-msg.err{color:#c14a4a}

  .sumline{display:flex;justify-content:space-between;font-size:.92rem;color:var(--coffee);margin-bottom:.55rem}
  .sumline.discount{color:var(--sage)}
  .sumline.total{color:var(--espresso);font-weight:800;font-size:1.2rem;font-family:var(--serif);padding-top:.8rem;border-top:1px solid var(--line);margin-top:.6rem}
  .cart-trust{display:flex;flex-direction:column;gap:.45rem;margin-top:1rem;padding-top:.8rem;border-top:1px solid var(--line)}
  .cart-trust div{display:flex;align-items:center;gap:.5rem;font-size:.78rem;color:var(--coffee);font-weight:500}
  .cart-trust svg{color:var(--wood);flex:none}

  .doc-choice{display:flex;gap:.6rem;margin-bottom:1rem}
  .doc-choice label{flex:1;text-align:center;padding:.7em;border-radius:12px;border:1.5px solid var(--line);font-weight:700;font-size:.88rem;cursor:pointer;transition:border .2s,background .2s}
  .doc-choice input{display:none}
  .doc-choice input:checked + span{color:var(--wood-dark)}
  .doc-choice label:has(input:checked){border-color:var(--wood);background:var(--cream-2)}

  .field{margin-bottom:.9rem}
  .field label{font-size:.8rem;font-weight:700;display:block;margin-bottom:.35rem}
  .field input,.field textarea{width:100%;padding:.75em .9em;border-radius:10px;border:1.5px solid var(--line);background:var(--cream);font-family:inherit;font-size:.9rem}
  .field textarea{resize:vertical;min-height:72px}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--wood)}

  /* ============ CUSTOM SELECT ============ */
  .custom-select{position:relative;display:block}
  .custom-select select{display:none}
  .select-trigger{width:100%;padding:.75em .9em;border-radius:10px;border:1.5px solid var(--line);background:var(--cream);font-family:inherit;font-size:.9rem;color:var(--espresso);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:border .2s,background .2s;user-select:none}
  .select-trigger:hover{border-color:var(--wood)}
  .select-trigger.open{border-color:var(--wood);background:#fff;border-radius:10px 10px 0 0}
  .select-trigger.disabled{opacity:.5;cursor:not-allowed;background:var(--cream)}
  .select-trigger::after{content:'▼';font-size:.7rem;color:var(--coffee);flex:none;margin-left:.6em;transition:transform .2s}
  .select-trigger.open::after{transform:scaleY(-1)}
  .select-options{position:absolute;top:100%;left:0;right:0;background:#fff;border:1.5px solid var(--wood);border-top:none;border-radius:0 0 10px 10px;max-height:240px;overflow-y:auto;z-index:100;box-shadow:0 8px 16px -4px rgba(0,0,0,.1);display:none}
  .select-options.show{display:block}
  .select-option{padding:.75em .9em;cursor:pointer;color:var(--espresso);font-size:.9rem;transition:background .15s;display:flex;align-items:center;gap:.6em}
  .select-option:hover{background:var(--cream-2)}
  .select-option.selected{background:rgba(176,107,62,.12);color:var(--wood);font-weight:600}
  .select-option.selected::before{content:'✓';font-weight:700}
  .select-option.disabled{opacity:.5;cursor:not-allowed;background:transparent}

  .field-check{display:flex;align-items:center;gap:.5rem;font-size:.84rem;color:var(--coffee);margin-bottom:1rem}
  .field-check a{text-decoration:underline}
  .field-check.consent{align-items:flex-start}
  .field-check.consent input{margin-top:.2em;flex:none}

  .acc-tabs{display:flex;gap:.4rem;margin-bottom:1.2rem;background:var(--cream-2);border-radius:100px;padding:4px}
  .acc-tab{flex:1;padding:.6em 1em;border-radius:100px;font-weight:700;font-size:.86rem;color:var(--coffee);transition:background .2s,color .2s}
  .acc-tab.active{background:var(--espresso);color:#fff}
  .acc-error{background:#fbeaea;color:#c14a4a;border-radius:10px;padding:.6em .9em;font-size:.84rem;font-weight:600;margin-bottom:1rem}
  .acc-panel{display:grid;gap:.9rem}
  .acc-note{font-size:.84rem;color:var(--coffee);background:var(--cream-2);border-radius:10px;padding:.7em .9em;margin-bottom:1.2rem}
  .acc-summary{background:var(--cream-2);border-radius:12px;padding:14px 16px;margin-bottom:1rem}
  .acc-summary b{display:block} .acc-summary span{font-size:.85rem;color:var(--coffee)}
  .acc-actions{display:flex;gap:.6rem}
  .acc-orders{margin-top:1.6rem;border-top:1px solid var(--line);padding-top:1.2rem}
  .acc-orders h3{font-size:1.05rem;margin-bottom:.8rem}
  .acc-order{background:var(--cream-2);border-radius:12px;padding:12px 14px;margin-bottom:.7rem;font-size:.86rem}
  .acc-order-head{display:flex;justify-content:space-between;align-items:center;gap:.6rem;margin-bottom:.3rem;font-weight:700}
  .acc-order-items{color:var(--coffee);margin-bottom:.3rem}
  .acc-order-total{font-family:var(--serif);font-weight:600}
  .badge2{display:inline-flex;align-items:center;gap:.35em;font-size:.68rem;font-weight:800;padding:.3em .7em;border-radius:100px;white-space:nowrap}
  .b-on{background:#e4f2ea;color:#2f9e6f} .b-off{background:#f0e9e3;color:var(--coffee)}
  .b-warn{background:#f9efdc;color:#c98a2b} .b-info{background:#e6eef7;color:#3b6ea5}
  .b-danger{background:#fbe9e9;color:#c14a4a}

  .invoice-note{font-size:.78rem;color:var(--coffee);background:var(--cream-2);border-radius:10px;padding:.7em .9em;margin-bottom:1rem}
  .min-warn{font-size:.82rem;color:#c14a4a;font-weight:600;margin-bottom:.8rem}

  .thankyou{text-align:center;padding:80px 20px}
  .thankyou svg{width:76px;height:76px;color:var(--sage);margin:0 auto 1.2rem}
  .thankyou h2{font-size:1.8rem;margin-bottom:.6rem}
  .thankyou p{color:var(--coffee);max-width:44ch;margin:0 auto 1.6rem}

  /* ============ TOAST ============ */
  .toast{position:fixed;bottom:26px;left:50%;transform:translate(-50%,140%);z-index:200;background:var(--espresso);color:#fff;padding:.9em 1.4em;border-radius:100px;font-weight:600;font-size:.9rem;box-shadow:0 20px 40px -16px rgba(0,0,0,.4);display:flex;align-items:center;gap:.6em;transition:transform .4s cubic-bezier(.3,.8,.3,1)}
  .toast.show{transform:translate(-50%,0)}
  .toast svg{width:19px;height:19px;color:var(--sage);flex:none}
  .toast.err svg{color:#e08a8a}

  /* ============ CONFIRM MODAL ============ */
  .confirm-ov{position:fixed;inset:0;background:rgba(30,20,14,.55);backdrop-filter:blur(3px);z-index:210;display:none;align-items:center;justify-content:center;padding:20px}
  .confirm-ov.show{display:flex}
  .confirm-box{background:var(--paper);border-radius:var(--r-lg);max-width:380px;width:100%;box-shadow:var(--shadow);padding:30px;text-align:center}
  .confirm-box svg{width:44px;height:44px;color:var(--wood);margin:0 auto 1rem}
  .confirm-box p{font-size:.98rem;margin-bottom:1.5rem}
  .confirm-box .confirm-actions{display:flex;gap:.7rem}
  .confirm-box .confirm-actions button{flex:1}

  /* ============ ADDRESS MODAL ============ */
  .addr-modal-ov{position:fixed;inset:0;background:rgba(30,20,14,.55);backdrop-filter:blur(3px);z-index:220;display:none;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
  .addr-modal-ov.show{display:flex}
  .addr-modal-box{background:var(--paper);border-radius:var(--r-lg);max-width:500px;width:100%;box-shadow:var(--shadow-lg);padding:28px;margin:auto}
  .addr-modal-box h3{font-size:1.2rem;margin-bottom:1rem;font-family:var(--serif);font-weight:600}
  .addr-modal-box .form-actions{display:flex;gap:.7rem;margin-top:1.5rem;justify-content:flex-end}
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:640px){ .grid-2{grid-template-columns:1fr} }

  /* ============ ADDRESS CARDS ============ */
  .addr-cards{display:grid;gap:10px;margin-top:.6rem}
  .addr-card{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;cursor:pointer;transition:border .2s,background .2s}
  .addr-card:hover{border-color:var(--wood)}
  .addr-card input{margin-top:3px;accent-color:var(--wood);flex:none}
  .addr-card:has(input:checked){border-color:var(--wood);background:var(--cream-2)}
  .addr-card b{display:block;font-size:.92rem}
  .addr-card span{font-size:.82rem;color:var(--coffee)}
  .addr-default-tag{display:inline-block;margin-top:.35rem;font-size:.7rem;font-weight:800;color:var(--sage);text-transform:uppercase;letter-spacing:.04em}
  .addr-empty{padding:16px;border:1.5px dashed var(--line);border-radius:12px;text-align:center;font-size:.88rem;color:var(--coffee)}

  /* ============ CHECKOUT STEPS ============ */
  .checkout-steps{margin-bottom:2.4rem}
  .cs-track{display:flex;align-items:flex-start;max-width:360px;margin:0 auto;position:relative}
  .cs-track::before{content:'';position:absolute;top:14px;left:calc(12.5% + 15px);right:calc(12.5% + 15px);height:2px;background:var(--line)}
  .cs-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative}
  .cs-dot{width:30px;height:30px;border-radius:50%;border:2.5px solid var(--line);background:var(--paper);display:grid;place-items:center;font-size:.75rem;font-weight:800;color:var(--coffee);position:relative;z-index:1}
  .cs-label{font-size:.69rem;font-weight:700;color:var(--coffee);text-align:center}
  .cs-step.active .cs-dot{border-color:var(--wood);color:var(--wood);background:#fff;box-shadow:0 0 0 4px rgba(176,107,62,.14)}
  .cs-step.done .cs-dot{border-color:var(--wood);background:var(--wood);color:#fff}
  .cs-step.active .cs-label,.cs-step.done .cs-label{color:var(--espresso)}

  @media(max-width:860px){ .cart-layout{grid-template-columns:1fr} .cart-summary-col{position:static;max-height:none;overflow:visible;order:-1} .row-item{flex-wrap:wrap} }
</style>
</head>
<body>

<header>
  <div class="wrap nav">
    <a href="index.html" class="brand">
      <span class="mark"><img class="brand-logo" src="img/logo-mark.png" alt="Lloope"/></span>
      <span class="brand-name">Lloope</span>
    </a>
    <a href="index.html#catalogo" class="back-link">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M11 18l-6-6 6-6"/></svg>
      Seguir comprando
    </a>
    <button class="icon-btn" id="accountBtn" aria-label="Mi cuenta">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-6 8-6s8 2 8 6"/></svg>
    </button>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="page-title">
      <span>Tu pedido</span>
      <h1>Carrito de compra</h1>
    </div>
    <div id="checkoutSteps" class="checkout-steps" style="display:none">
      <div class="cs-track">
        <div class="cs-step" id="csStep0"><div class="cs-dot">1</div><span class="cs-label">Carrito</span></div>
        <div class="cs-step" id="csStep1"><div class="cs-dot">2</div><span class="cs-label">Envío</span></div>
        <div class="cs-step" id="csStep2"><div class="cs-dot">3</div><span class="cs-label">Datos</span></div>
        <div class="cs-step" id="csStep3"><div class="cs-dot">4</div><span class="cs-label">Finalizar</span></div>
      </div>
    </div>
    <div id="cartRoot"></div>
  </div>
</main>

<!-- MODAL CUENTA -->
<div class="pm-overlay" id="accountOverlay" style="position:fixed;inset:0;background:rgba(30,20,14,.55);backdrop-filter:blur(3px);z-index:110;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto">
  <div style="background:var(--paper);border-radius:var(--r-lg);max-width:440px;width:100%;box-shadow:var(--shadow);position:relative;margin:auto;padding:32px">
    <button id="accountClose" aria-label="Cerrar" style="position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:10px;background:var(--cream);display:grid;place-items:center">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
    <h2 id="accountTitle" style="font-size:1.3rem;margin-bottom:.6rem">Mi cuenta</h2>
    <div id="accountFormWrap"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 4 4L19 6"/></svg>
  <span id="toastMsg">Guardado</span>
</div>

<!-- CONFIRM MODAL -->
<div class="confirm-ov" id="confirmOv">
  <div class="confirm-box">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>
    <p id="confirmMsg">¿Confirmas esta acción?</p>
    <div class="confirm-actions">
      <button class="btn btn-ghost" id="confirmCancel">Cancelar</button>
      <button class="btn btn-wood" id="confirmOk">Confirmar</button>
    </div>
  </div>
</div>

<!-- ADDRESS MODAL (agregar dirección en carrito) -->
<div class="addr-modal-ov" id="addrModalOv">
  <div class="addr-modal-box">
    <h3>Agregar nueva dirección</h3>
    <form id="addrModalForm" style="display:grid;gap:.9rem">
      <div class="field">
        <label>Calle *</label>
        <input type="text" id="amod_street" required placeholder="Av. Providencia" />
      </div>
      <div class="grid-2">
        <div class="field">
          <label>Número *</label>
          <input type="text" id="amod_number" required placeholder="1234" />
        </div>
        <div class="field">
          <label>Piso/Depto</label>
          <input type="text" id="amod_apartment" placeholder="Depto 56" />
        </div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label>Región *</label>
          <select id="amod_region" required>
            <option value="">Selecciona una región</option>
          </select>
        </div>
        <div class="field">
          <label>Ciudad / Comuna *</label>
          <select id="amod_city" required disabled>
            <option value="">Primero elige región</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Código postal</label>
        <input type="text" id="amod_zip" placeholder="7500000" />
      </div>
      <label class="field-check">
        <input type="checkbox" id="amod_default" />
        <span>Dirección por defecto</span>
      </label>
    </form>
    <div class="form-actions">

/* ============ CUSTOM SELECT DROPDOWN ============
   Envuelve un <select> nativo en un dropdown propio. Es re-invocable: si el
   select ya fue envuelto, en vez de crear todo de nuevo solo re-sincroniza
   el trigger/lista con el estado actual (options/disabled/selectedIndex).
   Esto es necesario porque cambiar .innerHTML o .disabled por código (como
   al cascadear región → ciudad) NO dispara un evento 'change' nativo, así
   que sin este refresh explícito el dropdown visual queda desincronizado
   del <select> real (se ve "pegado" en el valor/placeholder anterior). */
function createCustomSelect(selectEl){
  const refresh=()=>{
    const trigger=selectEl._csTrigger, optionsList=selectEl._csOptions;
    const selected=selectEl.options[selectEl.selectedIndex];
    trigger.textContent=selected ? selected.textContent : 'Selecciona';
    trigger.classList.toggle('disabled', selectEl.disabled);
    optionsList.innerHTML='';
    [...selectEl.options].forEach((opt,i)=>{
      const div=document.createElement('div');
      div.className='select-option'+(selectEl.selectedIndex===i?' selected':'')+(opt.disabled?' disabled':'');
      div.textContent=opt.textContent;
      div.onclick=()=>{
        if(opt.disabled) return;
        selectEl.selectedIndex=i;
        selectEl.dispatchEvent(new Event('change'));
        optionsList.classList.remove('show'); trigger.classList.remove('open');
      };
      optionsList.appendChild(div);
    });
  };

  if(selectEl.classList.contains('custom-select-init')){ refresh(); return; }
  selectEl.classList.add('custom-select-init');
  selectEl.style.display='none';

  const wrapper=document.createElement('div');
  wrapper.className='custom-select';
  selectEl.parentNode.insertBefore(wrapper, selectEl);
  wrapper.appendChild(selectEl);

  const trigger=document.createElement('div');
  trigger.className='select-trigger';
  const optionsList=document.createElement('div');
  optionsList.className='select-options';
  wrapper.insertBefore(trigger, selectEl);
  wrapper.insertBefore(optionsList, selectEl);
  selectEl._csTrigger=trigger; selectEl._csOptions=optionsList;

  trigger.onclick=e=>{
    e.stopPropagation();
    if(selectEl.disabled) return;
    const willOpen=!optionsList.classList.contains('show');
    document.querySelectorAll('.select-options.show').forEach(o=>o.classList.remove('show'));
    document.querySelectorAll('.select-trigger.open').forEach(t=>t.classList.remove('open'));
    if(willOpen){ optionsList.classList.add('show'); trigger.classList.add('open'); }
  };

  selectEl.addEventListener('change', refresh);
  refresh();
}

/* Cierra cualquier dropdown abierto al hacer click fuera (un solo listener
   global, no uno por select). */
document.addEventListener('click', ()=>{
  document.querySelectorAll('.select-options.show').forEach(o=>o.classList.remove('show'));
  document.querySelectorAll('.select-trigger.open').forEach(t=>t.classList.remove('open'));
});

function initCustomSelects(){
  document.querySelectorAll('select').forEach(sel=>createCustomSelect(sel));
}

function validateCoupon(codeRaw){
  const code=String(codeRaw||'').trim().toUpperCase();
  if(!code) return {ok:false,msg:'Ingresa un código de cupón.'};
  const c=coupons.find(x=>String(x.code).toUpperCase()===code);
  if(!c) return {ok:false,msg:'Ese cupón no existe.'};
  if(!c.active) return {ok:false,msg:'Este cupón ya no está disponible.'};
  const today=Lloope.today();
  if(c.startDate && today<c.startDate) return {ok:false,msg:'Este cupón aún no está vigente.'};
  if(c.endDate && today>c.endDate) return {ok:false,msg:'Este cupón ya venció.'};
  if(c.singleUse && Lloope.isCouponUsedLocally(c.code)) return {ok:false,msg:'Este cupón de un solo uso ya fue utilizado.'};
  return {ok:true,coupon:c};
}
function computeDiscount(subtotal){
  if(!appliedCoupon) return 0;
  if(appliedCoupon.type==='percent') return Math.round(subtotal*(Number(appliedCoupon.value)||0)/100);
  return Math.min(Number(appliedCoupon.value)||0, subtotal);
}

function lineItems(){
  return cart.map(i=>({ ...i, p: products.find(x=>x.id===i.id) })).filter(x=>x.p);
}
function subtotalOf(items){ return items.reduce((s,i)=> i.p.quote ? s : s+effPrice(i.p)*i.qty, 0); }

function changeQty(id,d){
  const item=cart.find(i=>i.id===id); if(!item)return;
  const p=products.find(x=>x.id===id);
  const maxQty=(p && !p.quote)?Math.max(0,Number(p.stock)||0):Infinity;
  const next=item.qty+d;
  if(d>0 && next>maxQty){ toast('Solo quedan '+maxQty+' unidades disponibles.', true); return; }
  item.qty=next;
  if(item.qty<=0) cart=cart.filter(i=>i.id!==id);
  Lloope.setCart(cart);
  render();
}
function removeItem(id){ cart=cart.filter(i=>i.id!==id); Lloope.setCart(cart); render(); }

function applyCoupon(){
  const items=lineItems(); const subtotal=subtotalOf(items);
  const res=validateCoupon($('#couponInput').value);
  const msgEl=$('#couponMsg');
  if(!res.ok){ appliedCoupon=null; msgEl.textContent=res.msg; msgEl.className='coupon-msg err'; renderSummaryTotals(subtotal); return; }
  appliedCoupon=res.coupon;
  const desc=appliedCoupon.type==='percent'?(appliedCoupon.value+'% de descuento'):(CLP(appliedCoupon.value)+' de descuento');
  msgEl.textContent='¡Cupón aplicado! '+desc; msgEl.className='coupon-msg ok';
  renderSummaryTotals(subtotal);
}

function renderSummaryTotals(subtotal){
  const discount=computeDiscount(subtotal);
  const ship=Number(cartCfg.shippingCost)||0;
  const total=Math.max(0,subtotal-discount)+ship;
  $('#sumSubtotal').textContent=CLP(subtotal);
  const discLine=$('#sumDiscount');
  if(discount>0){ discLine.style.display='flex'; $('#sumDiscountLabel').textContent='Descuento ('+appliedCoupon.code+')'; $('#sumDiscountAmount').textContent='-'+CLP(discount); }
  else discLine.style.display='none';
  const shipLine=$('#sumShip');
  if(ship>0){ shipLine.style.display='flex'; $('#sumShipAmount').textContent=CLP(ship); } else shipLine.style.display='none';
  $('#sumTotal').textContent=CLP(total);
  const min=Number(cartCfg.minPurchase)||0;
  const warn=$('#minWarn');
  if(min>0 && subtotal<min){ warn.style.display='block'; warn.textContent='Compra mínima: '+CLP(min)+'. Agrega '+CLP(min-subtotal)+' más para continuar.'; $('#finishBtn').disabled=true; }
  else { warn.style.display='none'; $('#finishBtn').disabled=false; }
}

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
        </button>

    </div>`).join('');

  $('#couponApply').onclick=applyCoupon;

    $('#invoiceFields').style.display = $('input[name="doc"]:checked').value==='factura' ? 'block' : 'none';
  });
  document.querySelectorAll('input[name="shipping"]').forEach(r=>r.onchange=()=>{
    const isDespacho=$('input[name="shipping"]:checked').value==='despacho';
    $('#addressSelector').style.display = isDespacho ? 'block' : 'none';
    $('#pickupSection').style.display = isDespacho ? 'none' : 'block';

  };
  $('#finishBtn').onclick=finishCheckout;

  const mpBtn=$('#payMpBtn');
  if(mpBtn){ mpBtn.style.display=mpEnabled?'':'none'; mpBtn.onclick=payWithMercadoPago; }

  loadAddressesForCheckout();
  renderSummaryTotals(subtotalOf(items));
  initSteps();
}

async function loadAddressesForCheckout(){
  if(!Lloope.auth.isConfigured()){
    $('#addressSelector').style.display='none';
    return;
  }
  const session=await Lloope.auth.getSession();
  if(!session){
    $('#addressSelector').style.display='none';
    return;
  }
  const c=Lloope.auth.client();
  const {data}=await c.from('addresses').select('*').eq('user_id',session.user.id).order('is_default',{ascending:false});
  const box=$('#addrCards');
  if(!data?.length){
    box.innerHTML=`<div class="addr-empty">Todavía no tienes direcciones guardadas.<br><a href="#" onclick="openAddrModal(); return false" style="color:var(--wood);font-weight:700">Agrega una aquí →</a></div>`;
    return;
  }
  box.innerHTML=data.map((a,i)=>`
    <label class="addr-card">
      <input type="radio" name="ck_address" value="${a.id}" ${i===0?'checked':''}>
      <div>
        <b>${esc(a.street)} ${esc(a.number)}${a.apartment?', '+esc(a.apartment):''}</b>
        <span>${a.region?esc(a.region)+', ':''}${esc(a.city)}${a.zip_code?' · '+esc(a.zip_code):''}</span>
        ${a.is_default?'<span class="addr-default-tag">Por defecto</span>':''}
      </div>
    </label>`).join('');
}

async function finishCheckout(){
  const items=lineItems();
  if(items.length===0) return;
  const name=$('#ck_name').value.trim(), email=$('#ck_email').value.trim(), phone=$('#ck_phone').value.trim();
  if(!name || !email){ toast('Completa tu nombre y correo para finalizar la compra.', true); return; }
  if(!$('#ck_consent').checked){ toast('Debes aceptar los Términos y la Política de Privacidad para continuar.', true); return; }

  const shippingMethod = $('input[name="shipping"]:checked').value || 'despacho';
  let selectedAddress = null;
  if(shippingMethod==='despacho'){
    const addressRadio = document.querySelector('input[name="ck_address"]:checked');
    if(!addressRadio){ toast('Selecciona una dirección de despacho o agrega una nueva.', true); return; }
    const addressId = addressRadio.value;
    if(Lloope.auth.isConfigured()){
      const session = await Lloope.auth.getSession();
      if(session){
        const c = Lloope.auth.client();
        const {data} = await c.from('addresses').select('*').eq('id',addressId).single();
        selectedAddress = data;
      }
    }
  }

  let pickup=null;
  if(shippingMethod==='retiro' && $('#ck_pickup_other').checked){
    const pName=$('#ck_pickup_name').value.trim(), pRut=$('#ck_pickup_rut').value.trim();
    if(!pName||!pRut){ toast('Completa el nombre y RUT de quien retirará el pedido.', true); return; }
    pickup={ name:pName, rut:pRut };
  }

  const isFactura = cartCfg.allowInvoice && document.querySelector('input[name="doc"]:checked') && document.querySelector('input[name="doc"]:checked').value==='factura';
  let invoiceData=null;
  if(isFactura){
    const rut=$('#inv_rut').value.trim(), rz=$('#inv_rz').value.trim();
    if(!rut||!rz){ toast('Para factura, completa al menos el RUT y la razón social.', true); return; }
    invoiceData={ rut, rz, giro:$('#inv_giro').value.trim(), addr:$('#inv_addr').value.trim() };
  }
  const notes=$('#ck_notes').value.trim();

  // #2 Validación de stock en tiempo real contra lloope_api
  if(API_URL){
    const btn=$('#finishBtn');
    btn.disabled=true; btn.textContent='Verificando stock…';
    try{
      const r=await fetch(API_URL+'/api/products',{headers:{Accept:'application/json'}}).then(x=>x.json());
      if(r.products){
        const errs=[]; let changed=false;
        for(const item of items){
          const ap=r.products.find(p=>String(p.id)===String(item.p.id));
          if(!ap||ap.quote) continue;
          const avail=Math.max(0,Number(ap.stock)||0);
          if(avail===0){
            errs.push(`"${item.p.name}" está agotado`);
            cart=cart.filter(c=>c.id!==item.p.id); changed=true;
          } else if(item.qty>avail){
            errs.push(`"${item.p.name}": solo ${avail} disponible${avail!==1?'s':''} (tenías ${item.qty})`);
            const c=cart.find(x=>x.id===item.p.id); if(c){c.qty=avail; changed=true;}
          }
        }
        if(errs.length){
          if(changed) Lloope.setCart(cart);
          render();
          toast('Stock insuficiente — se ajustó tu carrito. Revisa y reintenta.',true);
          return;
        }
      }
    } catch(e){ /* API no disponible — continúa sin validación */ }
    if($('#finishBtn')){ $('#finishBtn').disabled=false; $('#finishBtn').innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15L2 22l5.1-1.3A10 10 0 1 0 12 2Z"/></svg> Finalizar compra por WhatsApp`; }
  }

  const subtotal=subtotalOf(items);
  const discount=computeDiscount(subtotal);
  const ship=Number(cartCfg.shippingCost)||0;
  const total=Math.max(0,subtotal-discount)+ship;

  let msg=(contact.waMessage||'¡Hola Lloope! Quiero hacer este pedido:')+'\n\n';
  items.forEach(i=>{ const line=i.p.quote?'A cotizar':CLP(effPrice(i.p)*i.qty); msg+=`• ${i.qty} × ${i.p.name} — ${line}\n`; });
  if(appliedCoupon) msg+=`\nCupón: ${appliedCoupon.code} (-${CLP(discount)})`;
  if(shippingMethod==='despacho'){
    if(ship>0) msg+=`\nDespacho: ${CLP(ship)}`;
    if(selectedAddress) msg+=`\nDirección: ${selectedAddress.street} ${selectedAddress.number}${selectedAddress.apartment?', '+selectedAddress.apartment:''}, ${selectedAddress.city}${selectedAddress.region?', '+selectedAddress.region:''}`;
  } else {
    msg+=`\nMétodo: Retiro en tienda`;
    msg+= pickup ? `\nRetira: ${pickup.name} (RUT ${pickup.rut})` : `\nRetira: el mismo comprador`;
  }
  msg+=`\nTotal referencial: ${CLP(total)}`;
  msg+=`\n\nDocumento: ${isFactura?'Factura':'Boleta'}`;
  if(invoiceData) msg+=`\nRUT: ${invoiceData.rut}\nRazón social: ${invoiceData.rz}\nGiro: ${invoiceData.giro}\nDirección: ${invoiceData.addr}`;
  if(notes) msg+=`\n\nInstrucciones especiales: ${notes}`;
  msg+=`\n\nContacto: ${name}${phone?(' · '+phone):''} · ${email}`;
  msg+=`\n\n${cartCfg.finishMessage||'¿Me confirman disponibilidad y despacho? ¡Gracias!'}`;
  msg+=`\n\n(Este pedido queda sujeto a confirmación de stock y disponibilidad.)`;

  /* El nombre/teléfono se guardan en el perfil: en Supabase si hay sesión
     (así quedan disponibles desde cualquier dispositivo), o en localStorage
     si es invitado (checkbox "Guardar mis datos", solo existe en ese caso). */
  if(currentSession){ Lloope.auth.updateUserMeta({name, phone}); }
  else if($('#ck_save') && $('#ck_save').checked){ Lloope.setProfile({name, email, phone}); }
  if(appliedCoupon && appliedCoupon.singleUse) Lloope.markCouponUsedLocally(appliedCoupon.code);

  window.open(waLink(msg),'_blank');

  /* Si el cliente tiene sesión (cuenta real), registra el pedido en Supabase
     para que aparezca en "Mis pedidos" y en el panel admin. Si no hay sesión
     o Supabase no está configurado, esto no hace nada — el checkout sigue
     funcionando igual que siempre por WhatsApp. */
  if(Lloope.auth.isConfigured()){
    const session=await Lloope.auth.getSession();
    if(session){
      Lloope.auth.createOrder({
        customer: name, phone, email,
        items: items.map(i=>({ name:i.p.name, qty:i.qty, price: i.p.quote?0:effPrice(i.p) })),
        total,
        pay_method: 'Por confirmar por WhatsApp',
        pay_status: 'Pendiente de pago',
        notes: [invoiceData ? `Factura — RUT ${invoiceData.rut}, ${invoiceData.rz}` : '', notes].filter(Boolean).join(' · ')
      });
    }
  }

  cart=[]; Lloope.clearCart(); appliedCoupon=null;
  if(window._csScroll) window.removeEventListener('scroll', window._csScroll);
  $('#checkoutSteps').style.display='none';
  $('#cartRoot').innerHTML=`<div class="panel thankyou">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5L20 7"/></svg>
    <h2>¡Pedido enviado por WhatsApp!</h2>
    <p>Revisa la conversación que se abrió para confirmar los detalles con nosotros. Te contactaremos para coordinar personalización, pago y despacho.</p>
    <a href="index.html" class="btn btn-wood">Volver a la tienda</a>
  </div>`;
}

      </div>
      <div class="acc-actions"><button class="btn btn-ghost" id="accEdit">Editar</button><button class="btn btn-ghost" id="accForget">Olvidar mis datos</button></div>`;
    $('#accEdit').onclick=()=>renderGuestProfileEditForm(profile);
    $('#accForget').onclick=()=>{ showConfirm('¿Olvidar los datos guardados?', ()=>{ Lloope.clearProfile(); renderGuestProfileForm(); render(); toast('Datos olvidados'); }); };
  } else renderGuestProfileEditForm(null);
}
function renderGuestProfileEditForm(profile){
  profile=profile||{};
  $('#accountFormWrap').innerHTML=`
    <p class="acc-note">Se guardan solo en este navegador para agilizar tu próxima compra. No es una cuenta con contraseña.</p>
    <div class="field"><label>Nombre</label><input type="text" id="acc_name" value="${esc(profile.name||'')}"></div>
    <div class="field"><label>Correo</label><input type="email" id="acc_email" value="${esc(profile.email||'')}"></div>
    <div class="field"><label>Teléfono</label><input type="text" id="acc_phone" value="${esc(profile.phone||'')}"></div>
    <button class="btn btn-wood btn-block" id="accSave">Guardar</button>`;
  $('#accSave').onclick=()=>{
    const name=$('#acc_name').value.trim(), email=$('#acc_email').value.trim();
    if(!name||!email){ toast('Nombre y correo son obligatorios.', true); return; }
    Lloope.setProfile({name,email,phone:$('#acc_phone').value.trim()});
    renderGuestProfileForm(); render();
    toast('Datos guardados');
  };
}
$('#accountBtn').onclick=()=>{ renderAccountForm(); $('#accountOverlay').style.display='flex'; document.body.style.overflow='hidden'; };
$('#accountClose').onclick=()=>{ $('#accountOverlay').style.display='none'; document.body.style.overflow=''; };
$('#accountOverlay').addEventListener('click',e=>{ if(e.target===$('#accountOverlay')){ $('#accountOverlay').style.display='none'; document.body.style.overflow=''; } });

/* ============ CHECKOUT STEP INDICATOR ============ */
function setStep(n){
  document.querySelectorAll('.cs-step').forEach((el,i)=>{
    el.classList.toggle('done', i < n);
    el.classList.toggle('active', i === n);
    el.querySelector('.cs-dot').textContent = i < n ? '✓' : String(i+1);
  });
}
function initSteps(){
  $('#checkoutSteps').style.display='';
  const onScroll=()=>{
    const mid=window.innerHeight * 0.55;
    let step=0;
    const ship=$('#panelShip'), data=$('#panelData'), fin=$('#finishBtn');
    if(fin && fin.getBoundingClientRect().top < mid) step=3;
    else if(data && data.getBoundingClientRect().top < mid) step=2;
    else if(ship && ship.getBoundingClientRect().top < mid) step=1;
    setStep(step);
  };
  if(window._csScroll) window.removeEventListener('scroll', window._csScroll);
  window._csScroll=onScroll;
  window.addEventListener('scroll', onScroll, {passive:true});
  onScroll();
}

/* ---- Pagar con Mercado Pago ---- */
async function payWithMercadoPago(){
  const items=lineItems();
  if(items.length===0) return;
  const name=$('#ck_name').value.trim(), email=$('#ck_email').value.trim(), phone=$('#ck_phone').value.trim();
  if(!name||!email){ toast('Completa tu nombre y correo para continuar.',true); return; }
  if(!$('#ck_consent').checked){ toast('Debes aceptar los Términos y la Política de Privacidad para continuar.',true); return; }

  const btn=$('#payMpBtn');
  btn.disabled=true; btn.textContent='Conectando con Mercado Pago…';

  const subtotal=subtotalOf(items);
  const discount=computeDiscount(subtotal);
  const ship=Number(cartCfg.shippingCost)||0;

  const body={
    items: items.map(i=>({
      id: String(i.p.id),
      title: i.p.name,
      quantity: i.qty,
      unit_price: i.p.quote ? 0 : effPrice(i.p)
    })).filter(i=>i.unit_price>0),
    payer: { name, email },
    shipping_cost: ship,
    coupon_discount: discount
  };

  try{
    const r=await fetch(API_URL+'/api/checkout',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const d=await r.json();
    if(!r.ok){
      if(d.details){ toast(d.details.join('. '),true); render(); }
      else toast(d.error||'Error al crear el pago',true);
      btn.disabled=false; btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 4H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2ZM3 10h18M7 15h4"/></svg> Pagar con Mercado Pago';
      return;
    }

    if(currentSession){ Lloope.auth.updateUserMeta({name,phone}); }
    else if($('#ck_save')&&$('#ck_save').checked){ Lloope.setProfile({name,email,phone}); }
    if(appliedCoupon&&appliedCoupon.singleUse) Lloope.markCouponUsedLocally(appliedCoupon.code);

    const mp=paymentCfg.mercadoPago||{};
    const url=(mp.mode==='production') ? d.init_point : d.sandbox_init_point;
    window.location.href=url;
  }catch(e){
    toast('No se pudo conectar al servidor de pagos: '+e.message,true);
    btn.disabled=false; btn.innerHTML='<svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 4H3a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2ZM3 10h18M7 15h4"/></svg> Pagar con Mercado Pago';
  }
}

/* ---- Validación de stock ---- */
function validateAndFixCart(prods){
  const removed=[], reduced=[];
  cart=cart.filter(item=>{
    const p=prods.find(x=>x.id===item.id);
    if(!p || p.quote) return true;
    const avail=Math.max(0,Number(p.stock)||0);
    if(!p.active||avail===0){ removed.push(p.name||item.id); return false; }
    if(item.qty>avail){ reduced.push({name:p.name,was:item.qty,now:avail}); item.qty=avail; }
    return true;
  });
  if(removed.length||reduced.length) Lloope.setCart(cart);
  return {removed, reduced};
}

/* ---- Arranque ---- */
async function boot(){
  const DATA=await Lloope.loadPublicData();
  contact=DATA.contact; cartCfg=DATA.cart; coupons=DATA.coupons||[];
  products=DATA.products||[]; paymentCfg=DATA.payment||{};
  Lloope.auth.init(DATA.supabase);
  WHATSAPP=String(contact.whatsapp||'').replace(/\D/g,'');
  API_URL=(DATA.supabase?.apiUrl||'').replace(/\/$/,'');

  /* Si el cliente vuelve desde el magic link o desde el link de "olvidé mi
     contraseña" que le enviamos por correo, Supabase deja la sesión
     codificada en el hash de la URL (#access_token=…). getSession() la
     detecta y la persiste; luego limpiamos la URL y abrimos "Mi cuenta".
     type=recovery distingue "vengo a poner contraseña nueva" del login normal. */
  if(Lloope.auth.isConfigured() && window.location.hash.includes('access_token')){
    const isRecovery=window.location.hash.includes('type=recovery');
    await Lloope.auth.getSession();
    history.replaceState(null,'',window.location.pathname+window.location.search);
    $('#accountOverlay').style.display='flex'; document.body.style.overflow='hidden';
    if(isRecovery) renderSetNewPassword(); else renderAccountForm();
  }
  const settings=DATA.settings||{};
  $('.brand-name').textContent=settings.storeName||'Lloope';
  const logo=(DATA.images&&DATA.images.logo)||settings.logo;
  if(logo) $('.brand-logo').src=logo;
  document.title='Tu carrito · '+(settings.storeName||'Lloope');
  if(Lloope.auth.isConfigured()) currentSession=await Lloope.auth.getSession();
  const _adj=validateAndFixCart(products);
  render();
  if(_adj.removed.length||_adj.reduced.length){
    setTimeout(()=>toast('Tu carrito fue ajustado por cambios de stock. Revisa las cantidades antes de continuar.',true),350);
  }
}

/* Se llama tras iniciar/cerrar sesión desde el modal "Mi cuenta" para que el
   formulario de contacto del checkout se actualice con (o deje de mostrar)
   los datos precargados, sin tener que recargar la página. */
async function refreshSessionAndRender(){
  currentSession = Lloope.auth.isConfigured() ? await Lloope.auth.getSession() : null;
  render();
}
boot();
</script>
